<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>DrawFate</title>
  <meta name="description" content="จำลองการจับใบดำใบแดง ตั้งจำนวน ดูโอกาส สุ่มผลได้เลย">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Palette ────────────────────────────────────
       Black Swarm   #000000
       Bonfire Red   #da1a32
       Embers        #a00c30
       Magnolia White #ffffff
    ─────────────────────────────────────────────── */
    :root {
      --red:    #da1a32;
      --ember:  #a00c30;
      --white:  #ffffff;
      --t1: #ffffff;
      --t2: rgba(255,255,255,.52);
      --t3: rgba(255,255,255,.26);
      --sep: rgba(255,255,255,.08);
      --fill:  rgba(255,255,255,.08);
      --fill2: rgba(255,255,255,.14);
      --r: 20px;
    }

    body {
      font-family: -apple-system, 'Sarabun', BlinkMacSystemFont, system-ui, sans-serif;
      background: #000;
      color: var(--t1);
      min-height: 100dvh;
      padding: 0 18px 96px;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ambient red glow */
    .ga, .gb {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
    }
    .ga {
      width: 580px; height: 580px;
      background: radial-gradient(circle, rgba(218,26,50,.09) 0%, transparent 62%);
      top: -240px; right: -160px;
    }
    .gb {
      width: 460px; height: 460px;
      background: radial-gradient(circle, rgba(160,12,48,.07) 0%, transparent 62%);
      bottom: -200px; left: -120px;
    }

    .wrap {
      max-width: 420px; margin: 0 auto;
      position: relative; z-index: 1;
    }

    /* ── Header ─────────────────────────────────── */
    header { padding: 52px 0 26px; text-align: center; }

    .app-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 14px;
      background: var(--red);
      box-shadow: 0 8px 28px rgba(218,26,50,.35);
      font-size: 1.5rem; margin-bottom: 13px;
      color: #fff;
    }

    .app-name {
      display: block; font-size: 1.55rem;
      font-weight: 800; letter-spacing: -.5px; color: var(--t1);
    }
    .app-sub { font-size: .86rem; color: var(--t2); margin-top: 5px; }

    /* ── Sheet (glass card) ─────────────────────── */
    .sheet {
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(48px) saturate(160%);
      -webkit-backdrop-filter: blur(48px) saturate(160%);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: var(--r);
      overflow: hidden;
      margin-bottom: 12px;
    }

    .sheet-head {
      padding: 16px 18px 8px;
      font-size: .7rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--t3);
    }

    .two-col {
      display: grid; grid-template-columns: 1fr 1fr;
    }
    .two-col > * + * { border-left: 1px solid var(--sep); }

    .cell { padding: 16px 14px 20px; text-align: center; }

    /* ── Slip counters ───────────────────────────── */
    .slip-tag {
      display: inline-flex; align-items: center; gap: 6px;
      margin-bottom: 3px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-k { background: rgba(255,255,255,.4); }
    .dot-r { background: var(--red); }

    .slip-name  { font-size: .78rem; font-weight: 600; color: var(--t2); }
    .slip-cap   { display: block; font-size: .7rem; color: var(--t3); margin-bottom: 14px; }

    .stepper {
      display: flex; align-items: center;
      justify-content: center; gap: 12px;
    }

    .s-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: none; background: var(--fill);
      color: var(--t1); font-size: 1.15rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .12s, transform .1s;
      -webkit-user-select: none; user-select: none;
    }
    .s-btn:hover:not(:disabled) { background: var(--fill2); }
    .s-btn:active:not(:disabled) { transform: scale(.82); }
    .s-btn:disabled { opacity: .18; cursor: default; }

    .s-val {
      font-size: 2.5rem; font-weight: 800; letter-spacing: -1.5px;
      min-width: 48px; text-align: center; line-height: 1;
    }
    .s-val.vk { color: rgba(255,255,255,.85); }
    .s-val.vr { color: var(--red); }

    /* ── Big Stats ───────────────────────────────── */
    .stat-cell { padding: 20px 12px 14px; text-align: center; }

    .stat-lbl {
      font-size: .7rem; font-weight: 600; letter-spacing: .4px;
      color: var(--t3); margin-bottom: 6px; min-height: 14px;
    }

    .stat-num {
      font-size: 4.5rem; font-weight: 800;
      letter-spacing: -3px; line-height: 1;
      transition: color .25s;
    }
    .stat-num.nk  { color: var(--t1); }
    .stat-num.nr  { color: var(--red); }
    .stat-num.nr.hot { text-shadow: 0 0 32px rgba(218,26,50,.45); }

    .stat-unit { font-size: .85rem; font-weight: 500; color: var(--t3); margin-top: 4px; }

    /* mode pill */
    .pill-row { padding: 0 16px 14px; text-align: center; }

    .mpill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 20px;
      font-size: .68rem; font-weight: 700;
      background: var(--fill); color: var(--t2);
    }
    .pip { width: 6px; height: 6px; border-radius: 50%; background: var(--t3); flex-shrink: 0; }

    .mpill.live { background: rgba(218,26,50,.12); color: var(--red); }
    .mpill.live .pip { background: var(--red); }
    .mpill.done { background: rgba(255,255,255,.07); color: var(--t2); }
    .mpill.done .pip { background: rgba(255,255,255,.35); }

    /* ── Draw area ───────────────────────────────── */
    .draw-area { padding: 24px 18px 20px; text-align: center; }

    /* flip card */
    .scene {
      width: 150px; height: 210px; margin: 0 auto 22px;
      perspective: 1000px;
      animation: float 4s ease-in-out infinite;
    }
    .scene.busy  { animation: none; }
    .scene.shake { animation: doShake .48s ease-out; }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    @keyframes doShake {
      0%,100% { transform: translateX(0); }
      12% { transform: translateX(-11px) rotate(-.9deg); }
      25% { transform: translateX(11px)  rotate(.9deg); }
      37% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      62% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
      87% { transform: translateX(-2px); }
    }

    .flip {
      width: 100%; height: 100%;
      position: relative; transform-style: preserve-3d;
      transition: transform .68s cubic-bezier(.34,.3,.1,1);
    }
    .flip.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 18px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* card back */
    .back {
      background: #060004;
      border: 1px solid rgba(218,26,50,.12);
      box-shadow: 0 20px 52px rgba(0,0,0,.8), 0 0 0 1px rgba(218,26,50,.05);
      overflow: hidden;
    }
    .back::before {
      content: ''; position: absolute; inset: 0;
      background-image:
        repeating-linear-gradient(60deg,
          rgba(218,26,50,.025) 0, rgba(218,26,50,.025) 1px,
          transparent 0, transparent 14px),
        repeating-linear-gradient(-60deg,
          rgba(218,26,50,.025) 0, rgba(218,26,50,.025) 1px,
          transparent 0, transparent 14px);
    }
    .back-sym  { position: relative; font-size: 1.7rem; color: rgba(218,26,50,.22); margin-bottom: 7px; }
    .back-word {
      position: relative; font-size: .58rem; letter-spacing: 4px;
      font-weight: 800; color: rgba(218,26,50,.18); text-transform: uppercase;
    }

    /* card front */
    .front { transform: rotateY(180deg); overflow: hidden; }

    /* ใบดำ = รอด → near-black card */
    .front.fk {
      background: linear-gradient(155deg, #141414 0%, #050505 100%);
      border: 1px solid rgba(255,255,255,.09);
      box-shadow: 0 20px 52px rgba(0,0,0,.8);
    }
    .front.fk::after {
      content: ''; position: absolute; inset: 12px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,.06);
    }

    /* ใบแดง = โดน → bold red card */
    .front.fr {
      background: linear-gradient(155deg, var(--red) 0%, var(--ember) 100%);
      border: 1px solid rgba(255,100,100,.15);
      box-shadow: 0 20px 52px rgba(0,0,0,.8), 0 0 60px rgba(218,26,50,.2);
    }
    .front.fr::after {
      content: ''; position: absolute; inset: 12px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,.1);
    }

    .res-label {
      position: relative;
      font-size: 1.4rem; font-weight: 900; letter-spacing: -.4px;
    }
    .res-label.rk { color: rgba(255,255,255,.75); }
    .res-label.rr { color: #ffffff; }

    .res-sub {
      position: relative;
      font-size: .72rem; font-weight: 600; letter-spacing: .5px;
      margin-top: 5px;
    }
    .res-sub.rk { color: rgba(255,255,255,.3); }
    .res-sub.rr { color: rgba(255,255,255,.6); }

    /* ── Draw button ─────────────────────────────── */
    .btn-draw {
      display: block; width: 100%; padding: 16px;
      border-radius: 14px; border: none;
      background: var(--red); color: #fff;
      font-family: inherit; font-size: 1rem; font-weight: 800;
      letter-spacing: -.2px; cursor: pointer;
      transition: transform .14s, background .12s, box-shadow .14s;
      box-shadow: 0 4px 24px rgba(218,26,50,.3);
      -webkit-user-select: none; user-select: none;
    }
    .btn-draw:hover:not(:disabled) {
      background: #f01e38; transform: translateY(-1px);
      box-shadow: 0 6px 32px rgba(218,26,50,.4);
    }
    .btn-draw:active:not(:disabled) {
      transform: scale(.975); background: var(--ember);
    }
    .btn-draw:disabled { opacity: .2; cursor: default; transform: none; box-shadow: none; }

    /* ── Run info ────────────────────────────────── */
    .run-info {
      display: flex; justify-content: space-between;
      padding-top: 14px; border-top: 1px solid var(--sep);
      margin-top: 16px; font-size: .78rem;
    }
    .ri-lbl { color: var(--t3); font-weight: 500; }
    .ri-val { font-weight: 700; color: var(--t2); margin-left: 3px; }

    /* ── History ─────────────────────────────────── */
    .hist-area {
      padding-top: 14px; border-top: 1px solid var(--sep); margin-top: 14px;
    }
    .hist-hdr {
      font-size: .67rem; font-weight: 700; letter-spacing: .9px;
      text-transform: uppercase; color: var(--t3); margin-bottom: 9px;
    }
    .hist-chips { display: flex; flex-wrap: wrap; gap: 5px; }

    .chip {
      height: 25px; min-width: 25px; padding: 0 7px;
      border-radius: 7px; display: inline-flex;
      align-items: center; justify-content: center;
      font-size: .67rem; font-weight: 800;
      animation: chipIn .22s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes chipIn {
      from { transform: scale(.2) rotate(-12deg); opacity: 0; }
      to   { transform: scale(1)  rotate(0);      opacity: 1; }
    }
    /* ใบดำ = รอด → dark chip */
    .chip-k {
      background: rgba(255,255,255,.07); color: var(--t3);
      border: 1px solid rgba(255,255,255,.08);
    }
    /* ใบแดง = โดน → red chip */
    .chip-r {
      background: var(--red); color: #fff;
    }

    /* ── Finished ────────────────────────────────── */
    .fin-box {
      padding: 22px 18px; border-radius: var(--r); margin-bottom: 12px;
      background: rgba(218,26,50,.08);
      border: 1px solid rgba(218,26,50,.15); text-align: center;
    }
    .fin-ico { font-size: 1.8rem; }
    .fin-ttl { font-size: 1rem; font-weight: 800; color: var(--red); margin-top: 8px; }
    .fin-sub { font-size: .78rem; color: var(--t3); margin-top: 4px; }

    /* ── Reset ───────────────────────────────────── */
    .btn-reset {
      display: block; width: 100%; padding: 14px;
      border-radius: 14px; border: 1px solid var(--sep);
      background: rgba(255,255,255,.03);
      backdrop-filter: blur(20px);
      color: var(--t2); font-family: inherit;
      font-size: .9rem; font-weight: 600; cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-reset:hover { background: rgba(255,255,255,.07); color: var(--t1); }
    .btn-reset:active { transform: scale(.98); }

    /* ── Confetti ────────────────────────────────── */
    #confetti { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 9999; }
    .c { position: absolute; animation: fall linear both; }
    @keyframes fall {
      0%   { transform: translateY(-10px) rotate(0); opacity: .9; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .zero-warn {
      text-align: center; font-size: .78rem; color: var(--red);
      padding: 10px 0; font-weight: 600;
    }

    @media (max-width: 360px) {
      .stat-num { font-size: 3.7rem; }
      .s-val    { font-size: 2.1rem; }
    }
  </style>
</head>
<body>
  <div class="ga"></div>
  <div class="gb"></div>
  <div id="confetti"></div>

  <div class="wrap">

    <header>
      <div class="app-icon">◆</div>
      <span class="app-name">DrawFate</span>
      <div class="app-sub">จำลองการจับใบดำใบแดง</div>
    </header>

    <!-- ── Setup ── -->
    <div class="sheet">
      <div class="sheet-head">ตั้งค่าใบ</div>
      <div class="two-col">

        <div class="cell">
          <div class="slip-tag">
            <span class="dot dot-k"></span>
            <span class="slip-name">ใบดำ</span>
          </div>
          <span class="slip-cap">รอดแล้ว!</span>
          <div class="stepper">
            <button class="s-btn" id="bm" onclick="adj('b',-1)">−</button>
            <div class="s-val vk" id="bc">1</div>
            <button class="s-btn" id="bp" onclick="adj('b',1)">+</button>
          </div>
        </div>

        <div class="cell">
          <div class="slip-tag">
            <span class="dot dot-r"></span>
            <span class="slip-name">ใบแดง</span>
          </div>
          <span class="slip-cap">โดน!</span>
          <div class="stepper">
            <button class="s-btn" id="rm" onclick="adj('r',-1)">−</button>
            <div class="s-val vr" id="rc">5</div>
            <button class="s-btn" id="rp" onclick="adj('r',1)">+</button>
          </div>
        </div>

      </div>
      <div id="zeroWarn" class="zero-warn" style="display:none">⚠ ต้องมีใบอย่างน้อย 1 ใบ</div>
    </div>

    <!-- ── Stats ── -->
    <div class="sheet">
      <div class="two-col">
        <div class="stat-cell">
          <div class="stat-lbl" id="pplLbl">ผู้เล่นทั้งหมด</div>
          <div class="stat-num nk" id="statPpl">6</div>
          <div class="stat-unit">คน</div>
        </div>
        <div class="stat-cell">
          <div class="stat-lbl" id="pctLbl">โอกาสโดน</div>
          <div class="stat-num nr" id="statPct">83.3</div>
          <div class="stat-unit">%</div>
        </div>
      </div>
      <div class="pill-row">
        <div class="mpill" id="mpill">
          <span class="pip"></span>
          <span id="mtext">ตั้งค่า</span>
        </div>
      </div>
    </div>

    <!-- ── Draw ── -->
    <div class="sheet">
      <div class="draw-area">

        <div class="scene" id="scene">
          <div class="flip" id="flip">
            <div class="face back">
              <div class="back-sym">◆</div>
              <div class="back-word">DrawFate</div>
            </div>
            <div class="face front" id="ffront"></div>
          </div>
        </div>

        <button class="btn-draw" id="drawBtn" onclick="draw()">จับใบ</button>

        <div class="run-info" id="runInfo" style="display:none">
          <span><span class="ri-lbl">ใบที่เหลือ</span><span class="ri-val" id="remC">—</span></span>
          <span><span class="ri-lbl">โอกาสโดน</span><span class="ri-val" id="remP">—</span></span>
        </div>

        <div class="hist-area" id="histArea" style="display:none">
          <div class="hist-hdr">ผลที่ผ่านมา</div>
          <div class="hist-chips" id="chips"></div>
        </div>

      </div>
    </div>

    <!-- ── Finished ── -->
    <div class="fin-box" id="finBox" style="display:none">
      <div class="fin-ico">◆</div>
      <div class="fin-ttl">จบรอบแล้ว</div>
      <div class="fin-sub" id="finSub"></div>
    </div>

    <button class="btn-reset" onclick="reset()">↺  รีเซ็ตเริ่มใหม่</button>
  </div>

  <script>
    // ใบดำ = รอด (safe)   b = black
    // ใบแดง = โดน (hit)   r = red
    let bT=1, rT=5, bR=1, rR=5;
    let busy=false, started=false, hist=[];

    const fmt = n => n%1===0 ? n.toFixed(0) : n.toFixed(1);

    function updateUI() {
      const tot = started ? bR+rR : bT+rT;
      // โอกาสโดน = สัดส่วน ใบแดง
      const red = started ? rR : rT;
      const pct = tot > 0 ? red/tot*100 : 0;

      document.getElementById('statPpl').textContent = tot;
      document.getElementById('statPct').textContent = fmt(pct);
      pct >= 50
        ? document.getElementById('statPct').classList.add('hot')
        : document.getElementById('statPct').classList.remove('hot');

      document.getElementById('pplLbl').textContent = started ? 'ใบที่เหลือ'  : 'ผู้เล่นทั้งหมด';
      document.getElementById('pctLbl').textContent = started ? 'โอกาสโดน'    : 'โอกาสโดน';

      const none = (bT+rT) === 0;
      document.getElementById('zeroWarn').style.display = none ? 'block' : 'none';
      document.getElementById('drawBtn').disabled = none || busy;

      document.getElementById('bm').disabled = started || bT<=0;
      document.getElementById('bp').disabled = started;
      document.getElementById('rm').disabled = started || rT<=0;
      document.getElementById('rp').disabled = started;
    }

    function adj(t, d) {
      if (started) return;
      if (t==='b') { bT=Math.max(0,Math.min(99,bT+d)); bR=bT; document.getElementById('bc').textContent=bT; }
      else          { rT=Math.max(0,Math.min(99,rT+d)); rR=rT; document.getElementById('rc').textContent=rT; }
      updateUI();
    }

    function draw() {
      if (busy || bR+rR===0) return;
      busy = true;
      document.getElementById('drawBtn').disabled = true;

      const scene = document.getElementById('scene');
      const flip  = document.getElementById('flip');
      const front = document.getElementById('ffront');

      scene.classList.add('busy');
      scene.classList.remove('shake');

      const wasFlipped = flip.classList.contains('flipped');
      if (wasFlipped) {
        flip.style.transition = 'transform .28s ease-in';
        flip.classList.remove('flipped');
      }

      setTimeout(() => {
        flip.style.transition = '';

        if (!started) {
          started = true; bR = bT; rR = rT;
          const p = document.getElementById('mpill');
          p.className = 'mpill live';
          document.getElementById('mtext').textContent = 'กำลังจับ';
          document.getElementById('runInfo').style.display  = 'flex';
          document.getElementById('histArea').style.display = 'block';
          updateUI();
        }

        // สุ่ม: isBlack = true → ดึงใบดำ = รอด
        const isBlack = Math.random() * (bR+rR) < bR;
        if (isBlack) bR--; else rR--;

        // ใบดำ = รอด → dark card
        // ใบแดง = โดน → red card
        front.className = 'face front ' + (isBlack ? 'fk' : 'fr');
        front.innerHTML = isBlack
          ? '<div class="res-label rk">รอด!</div><div class="res-sub rk">ใบดำ</div>'
          : '<div class="res-label rr">โดน!</div><div class="res-sub rr">ใบแดง</div>';

        requestAnimationFrame(() => flip.classList.add('flipped'));

        setTimeout(() => {
          scene.classList.remove('busy');

          if (isBlack) {
            launchConfetti();           // รอด = ยินดี
          } else {
            setTimeout(() => scene.classList.add('shake'), 30); // โดน = สั่น
          }

          hist.push(isBlack ? 'k' : 'r');
          const chip = document.createElement('div');
          chip.className = 'chip ' + (isBlack ? 'chip-k' : 'chip-r');
          chip.textContent = hist.length;
          document.getElementById('chips').appendChild(chip);

          updateUI();

          const rem = bR+rR;
          // โอกาสโดน = ใบแดงที่เหลือ
          const rp  = rem > 0 ? (rR/rem*100) : 0;
          document.getElementById('remC').textContent = ' ' + rem + ' ใบ';
          document.getElementById('remP').textContent = ' ' + fmt(rp) + '%';

          if (rem === 0) {
            setTimeout(finish, 900);
          } else {
            busy = false;
            document.getElementById('drawBtn').disabled = false;
          }
        }, 730);

      }, wasFlipped ? 320 : 60);
    }

    function finish() {
      const kC = hist.filter(x=>x==='k').length;
      const rC = hist.filter(x=>x==='r').length;
      document.getElementById('finSub').textContent = 'รอด ' + kC + ' คน · โดน ' + rC + ' คน';
      document.getElementById('finBox').style.display  = 'block';
      document.getElementById('drawBtn').style.display = 'none';
      const p = document.getElementById('mpill');
      p.className = 'mpill done';
      document.getElementById('mtext').textContent = 'จบรอบ';
      busy = false;
    }

    function reset() {
      started = false; busy = false; hist = [];
      bR = bT; rR = rT;

      const flip = document.getElementById('flip');
      flip.style.transition = 'transform .28s ease-in';
      flip.classList.remove('flipped');
      setTimeout(() => flip.style.transition = '', 300);

      const scene = document.getElementById('scene');
      scene.classList.remove('busy','shake');

      document.getElementById('mpill').className = 'mpill';
      document.getElementById('mtext').textContent = 'ตั้งค่า';
      document.getElementById('runInfo').style.display  = 'none';
      document.getElementById('histArea').style.display = 'none';
      document.getElementById('chips').innerHTML = '';
      document.getElementById('finBox').style.display   = 'none';
      document.getElementById('drawBtn').style.display  = '';

      updateUI();
    }

    // confetti สีขาว/แดงให้เข้า palette
    const CONF = ['#ffffff','#da1a32','#ff6b6b','#ffcccc','#a00c30','#ff9eb5','#ffe0e0'];

    function launchConfetti() {
      const box = document.getElementById('confetti');
      for (let i=0; i<55; i++) {
        setTimeout(() => {
          const p = document.createElement('div');
          p.className = 'c';
          const s = 5 + Math.random()*8;
          p.style.cssText = [
            `left:${Math.random()*100}%`,
            `width:${s}px`, `height:${s}px`,
            `background:${CONF[i%CONF.length]}`,
            `border-radius:${Math.random()>.5?'50%':'3px'}`,
            `animation-duration:${1.1+Math.random()*1.5}s`,
          ].join(';');
          box.appendChild(p);
          setTimeout(() => p.remove(), 3200);
        }, i * 17);
      }
    }

    updateUI();
  </script>
</body>
</html>
