<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#0a0a14">
  <title>DrawFate — จับใบดำใบแดง</title>
  <meta name="description" content="จำลองการจับใบดำใบแดง ตั้งจำนวน ดูโอกาส สุ่มผลได้เลย">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a14;
      --card: #12121e;
      --card-b: rgba(255,255,255,0.07);
      --inner: #1a1a2e;
      --gold: #f0c040;
      --gold2: #ff8c00;
      --red: #e84040;
      --text: #e8e8f0;
      --muted: #5a5a90;
      --radius: 18px;
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 16px 80px;
      -webkit-tap-highlight-color: transparent;
    }

    .container { max-width: 460px; margin: 0 auto; }

    /* ── Header ── */
    header { padding: 28px 0 18px; text-align: center; }

    .app-title {
      font-size: 2rem; font-weight: 900; letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .app-sub { font-size: 0.88rem; color: var(--muted); margin-top: 5px; }

    /* ── UI Card ── */
    .ui-card {
      background: var(--card);
      border: 1px solid var(--card-b);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
    }
    .card-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 1.8px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 16px;
    }

    /* ── Slip Controls ── */
    .slips-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .slip-box {
      background: var(--inner); border-radius: 12px;
      padding: 16px 10px; text-align: center;
    }
    .slip-dot {
      display: inline-block; width: 9px; height: 9px;
      border-radius: 50%; margin-right: 4px; vertical-align: middle;
    }
    .slip-dot.d { background: #666; }
    .slip-dot.r { background: var(--red); }
    .slip-type { font-size: 0.75rem; color: var(--muted); margin-bottom: 2px; }
    .slip-name { font-size: 1rem; font-weight: 800; margin-bottom: 1px; }
    .slip-desc { font-size: 0.68rem; color: var(--muted); margin-bottom: 13px; }

    .s-counter { display: flex; align-items: center; justify-content: center; gap: 8px; }

    .s-btn {
      width: 34px; height: 34px; border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      background: var(--card); color: var(--text);
      font-size: 1.25rem; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, transform 0.1s; flex-shrink: 0; line-height: 1;
      -webkit-user-select: none; user-select: none;
    }
    .s-btn:hover:not(:disabled) { background: #20203a; }
    .s-btn:active:not(:disabled) { transform: scale(0.88); }
    .s-btn:disabled { opacity: 0.22; cursor: default; }

    .s-num {
      font-size: 2.3rem; font-weight: 900; min-width: 46px; text-align: center; line-height: 1;
    }
    .s-num.dark-num { color: #bbb; }
    .s-num.red-num  { color: var(--red); }

    /* ── Big Stats ── */
    .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .stat-block {
      background: var(--inner); border-radius: 12px;
      padding: 18px 10px; text-align: center;
    }
    .stat-lbl { font-size: 0.7rem; color: var(--muted); font-weight: 700; letter-spacing: 0.5px; margin-bottom: 8px; }
    .stat-big  {
      font-size: 3.6rem; font-weight: 900; line-height: 1; letter-spacing: -2px;
      transition: color 0.3s;
    }
    .stat-big.ppl  { color: var(--gold); }
    .stat-big.pct  { color: var(--red); }
    .stat-big.pct.hot { text-shadow: 0 0 24px rgba(232,64,64,0.4); }
    .stat-unit { font-size: 0.95rem; font-weight: 600; opacity: 0.55; margin-top: 4px; }

    .mode-tag {
      display: inline-block; padding: 4px 12px; border-radius: 20px;
      font-size: 0.68rem; font-weight: 700; letter-spacing: 0.5px;
      margin-top: 12px;
    }
    .mode-tag.setup { background: rgba(90,90,144,0.18); color: var(--muted); border: 1px solid rgba(90,90,144,0.3); }
    .mode-tag.active { background: rgba(240,192,64,0.14); color: var(--gold); border: 1px solid rgba(240,192,64,0.28); }

    /* ── Draw Area ── */
    .draw-area { text-align: center; }

    /* Card flip */
    .card-scene {
      width: 140px; height: 196px; margin: 0 auto 20px;
      perspective: 900px;
      animation: cardFloat 3s ease-in-out infinite;
    }
    .card-scene.busy, .card-scene.do-shake { animation: none; }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-7px); }
    }
    @keyframes doShake {
      0%, 100% { transform: translateX(0); }
      15%  { transform: translateX(-10px) rotate(-2deg); }
      30%  { transform: translateX(10px)  rotate(2deg); }
      45%  { transform: translateX(-7px); }
      60%  { transform: translateX(7px); }
      80%  { transform: translateX(-3px); }
    }

    .flip-card {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.65s cubic-bezier(0.4, 0.2, 0.2, 1);
    }
    .flip-card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 14px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }

    /* Back face */
    .face-back {
      background: linear-gradient(145deg, #191930, #0c0c20);
      border: 2px solid rgba(255,255,255,0.09);
      overflow: hidden;
    }
    .face-back::before {
      content: '';
      position: absolute; inset: 0;
      background-image: repeating-linear-gradient(
        45deg,
        rgba(255,255,255,0.025) 0, rgba(255,255,255,0.025) 1px,
        transparent 0, transparent 50%
      );
      background-size: 10px 10px;
    }
    .back-icon  { font-size: 2.4rem; opacity: 0.4; position: relative; }
    .back-label {
      font-size: 0.7rem; letter-spacing: 3px; font-weight: 700;
      color: rgba(255,255,255,0.2); margin-top: 6px; position: relative;
    }

    /* Front face */
    .face-front { transform: rotateY(180deg); border: 2px solid transparent; }
    .face-front.res-black {
      background: linear-gradient(145deg, #1c1c30, #0a0a18);
      border-color: rgba(255,255,255,0.13);
    }
    .face-front.res-red {
      background: linear-gradient(145deg, #c0392b, #8b0000);
      border-color: rgba(255,120,120,0.35);
    }

    .res-icon  { font-size: 3rem; margin-bottom: 6px; }
    .res-label { font-size: 1.35rem; font-weight: 900; }
    .res-label.black-lbl { color: #c8c8c8; }
    .res-label.red-lbl   { color: #fff; text-shadow: 0 0 20px rgba(255,200,200,0.6); }

    /* Draw button */
    .btn-draw {
      display: block; width: 100%; padding: 17px 20px;
      border-radius: 14px; border: none;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #1a0800; font-family: 'Sarabun', sans-serif;
      font-size: 1.15rem; font-weight: 800; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 24px rgba(240,192,64,0.22);
      -webkit-user-select: none; user-select: none;
    }
    .btn-draw:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 32px rgba(240,192,64,0.32); }
    .btn-draw:active:not(:disabled) { transform: translateY(0); }
    .btn-draw:disabled { opacity: 0.3; cursor: default; transform: none; box-shadow: none; }

    /* Running info */
    .run-info {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06);
      margin-top: 16px; font-size: 0.8rem; color: var(--muted);
    }
    .run-val { font-weight: 700; color: var(--text); }

    /* History */
    .history-wrap {
      padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06);
      margin-top: 14px;
    }
    .hist-title {
      font-size: 0.68rem; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }
    .hist-list { display: flex; flex-wrap: wrap; gap: 5px; }

    .h-dot {
      width: 26px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.62rem; font-weight: 800;
      animation: dotPop 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes dotPop {
      from { transform: scale(0) rotate(-15deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }
    .h-dot.hb { background: #22223a; color: #888; border: 1px solid #333; }
    .h-dot.hr { background: #c0392b; color: #fff; }

    /* Finished */
    .finish-box {
      text-align: center; padding: 20px;
      background: rgba(240,192,64,0.07);
      border: 1px solid rgba(240,192,64,0.15);
      border-radius: 12px; margin-bottom: 16px;
    }
    .finish-ico   { font-size: 2.2rem; }
    .finish-title { font-size: 1.1rem; font-weight: 800; color: var(--gold); margin-top: 7px; }
    .finish-sub   { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    /* Reset */
    .btn-reset {
      display: block; width: 100%; padding: 14px;
      border-radius: 14px; border: 1px solid rgba(255,255,255,0.08);
      background: transparent; color: var(--muted);
      font-family: 'Sarabun', sans-serif; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-reset:hover { border-color: rgba(255,255,255,0.16); color: var(--text); background: rgba(255,255,255,0.03); }
    .btn-reset:active { transform: scale(0.98); }

    /* Confetti */
    #confetti {
      position: fixed; inset: 0;
      pointer-events: none; overflow: hidden; z-index: 9999;
    }
    .c-p {
      position: absolute;
      animation: cFall linear both;
    }
    @keyframes cFall {
      0%   { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(600deg); opacity: 0; }
    }

    /* Zero warning */
    .zero-msg {
      text-align: center; font-size: 0.85rem; color: var(--muted);
      padding: 6px 0 0;
    }

    /* Responsive */
    @media (max-width: 360px) {
      .stat-big { font-size: 2.9rem; }
      .app-title { font-size: 1.7rem; }
      .s-num { font-size: 2rem; }
    }
  </style>
</head>
<body>
  <div id="confetti"></div>

  <div class="container">
    <header>
      <div class="app-title">🎴 DrawFate</div>
      <div class="app-sub">จำลองการจับใบดำใบแดง</div>
    </header>

    <!-- Setup -->
    <div class="ui-card">
      <div class="card-label">ตั้งค่าใบ</div>
      <div class="slips-row">
        <div class="slip-box">
          <div class="slip-type"><span class="slip-dot d"></span>ใบดำ</div>
          <div class="slip-name" style="color:#aaa">โดน!</div>
          <div class="slip-desc">ถูกเลือก</div>
          <div class="s-counter">
            <button class="s-btn" id="bm" onclick="adj('b',-1)">−</button>
            <div class="s-num dark-num" id="bc">1</div>
            <button class="s-btn" id="bp" onclick="adj('b',1)">+</button>
          </div>
        </div>
        <div class="slip-box">
          <div class="slip-type"><span class="slip-dot r"></span>ใบแดง</div>
          <div class="slip-name" style="color:#e84040">ปลอดภัย!</div>
          <div class="slip-desc">รอดแล้ว</div>
          <div class="s-counter">
            <button class="s-btn" id="rm" onclick="adj('r',-1)">−</button>
            <div class="s-num red-num" id="rc">5</div>
            <button class="s-btn" id="rp" onclick="adj('r',1)">+</button>
          </div>
        </div>
      </div>
      <div id="zeroMsg" class="zero-msg" style="display:none">⚠️ ต้องมีใบอย่างน้อย 1 ใบ</div>
    </div>

    <!-- Big Stats -->
    <div class="ui-card">
      <div class="stats-row">
        <div class="stat-block">
          <div class="stat-lbl" id="pplLbl">ต้องการผู้เล่น</div>
          <div class="stat-big ppl" id="statPpl">6</div>
          <div class="stat-unit">คน</div>
        </div>
        <div class="stat-block">
          <div class="stat-lbl" id="pctLbl">โอกาสใบดำ</div>
          <div class="stat-big pct" id="statPct">16.7</div>
          <div class="stat-unit">%</div>
        </div>
      </div>
      <div style="text-align:center">
        <div class="mode-tag setup" id="modeTag">ตั้งค่า</div>
      </div>
    </div>

    <!-- Draw -->
    <div class="ui-card draw-area">
      <div class="card-scene" id="scene">
        <div class="flip-card" id="flipCard">
          <div class="card-face face-back">
            <div class="back-icon">🎴</div>
            <div class="back-label">DRAW</div>
          </div>
          <div class="card-face face-front" id="cardFront"></div>
        </div>
      </div>

      <button class="btn-draw" id="drawBtn" onclick="draw()">🎴 จับใบ</button>

      <div class="run-info" id="runInfo" style="display:none">
        <span>ใบที่เหลือ: <span class="run-val" id="remCount">—</span></span>
        <span>โอกาสครั้งนี้: <span class="run-val" id="remPct">—</span></span>
      </div>

      <div class="history-wrap" id="histWrap" style="display:none">
        <div class="hist-title">ผลที่ผ่านมา</div>
        <div class="hist-list" id="histList"></div>
      </div>
    </div>

    <!-- Finished -->
    <div class="finish-box" id="finishBox" style="display:none">
      <div class="finish-ico">🎊</div>
      <div class="finish-title">จับครบทุกคนแล้ว!</div>
      <div class="finish-sub" id="finishSummary"></div>
    </div>

    <button class="btn-reset" onclick="reset()">↺ รีเซ็ตเริ่มใหม่</button>
  </div>

  <script>
    // ── State ────────────────────────────────────────────────────────────
    let bT = 1, rT = 5;   // totals
    let bR = 1, rR = 5;   // remaining
    let busy = false, started = false;
    let history = [];

    // ── Update Stats Display ─────────────────────────────────────────────
    function updateStats() {
      const total  = started ? bR + rR : bT + rT;
      const black  = started ? bR      : bT;
      const pct    = total > 0 ? black / total * 100 : 0;
      const pctStr = pct % 1 === 0 ? pct.toFixed(0) : pct.toFixed(1);

      document.getElementById('statPpl').textContent = total;
      document.getElementById('statPct').textContent = pctStr;

      const pctEl = document.getElementById('statPct');
      pct >= 50 ? pctEl.classList.add('hot') : pctEl.classList.remove('hot');

      if (started) {
        document.getElementById('pplLbl').textContent = 'ใบที่เหลือ';
        document.getElementById('pctLbl').textContent = 'โอกาสครั้งนี้';
      } else {
        document.getElementById('pplLbl').textContent = 'ต้องการผู้เล่น';
        document.getElementById('pctLbl').textContent = 'โอกาสใบดำ';
      }

      // Zero warning
      const noSlips = (bT + rT) === 0;
      document.getElementById('zeroMsg').style.display = noSlips ? 'block' : 'none';
      document.getElementById('drawBtn').disabled = noSlips || busy;

      // Minus buttons
      document.getElementById('bm').disabled = started || bT <= 0;
      document.getElementById('bp').disabled = started;
      document.getElementById('rm').disabled = started || rT <= 0;
      document.getElementById('rp').disabled = started;
    }

    // ── Adjust Slip Count ────────────────────────────────────────────────
    function adj(type, d) {
      if (started) return;
      if (type === 'b') {
        bT = Math.max(0, Math.min(99, bT + d));
        document.getElementById('bc').textContent = bT;
      } else {
        rT = Math.max(0, Math.min(99, rT + d));
        document.getElementById('rc').textContent = rT;
      }
      bR = bT; rR = rT;
      updateStats();
    }

    // ── Draw Logic ───────────────────────────────────────────────────────
    function draw() {
      if (busy || bR + rR === 0) return;
      busy = true;
      document.getElementById('drawBtn').disabled = true;

      const scene    = document.getElementById('scene');
      const flipCard = document.getElementById('flipCard');
      const front    = document.getElementById('cardFront');

      scene.classList.add('busy');
      scene.classList.remove('do-shake');

      // 1. Reset flip if needed
      const wasFlipped = flipCard.classList.contains('flipped');
      if (wasFlipped) {
        flipCard.style.transition = 'transform 0.28s ease-in';
        flipCard.classList.remove('flipped');
      }

      setTimeout(() => {
        flipCard.style.transition = '';

        // 2. Start game on first draw
        if (!started) {
          started = true;
          bR = bT; rR = rT;
          document.getElementById('modeTag').className = 'mode-tag active';
          document.getElementById('modeTag').textContent = 'กำลังจับ';
          document.getElementById('runInfo').style.display = 'flex';
          document.getElementById('histWrap').style.display = 'block';
          updateStats();
        }

        // 3. Determine result
        const total   = bR + rR;
        const isBlack = Math.random() * total < bR;
        if (isBlack) bR--; else rR--;

        // 4. Set front face
        front.className = 'card-face face-front ' + (isBlack ? 'res-black' : 'res-red');
        front.innerHTML = isBlack
          ? '<div class="res-icon">🖤</div><div class="res-label black-lbl">โดน!</div>'
          : '<div class="res-icon">❤️</div><div class="res-label red-lbl">ปลอดภัย!</div>';

        // 5. Flip
        requestAnimationFrame(() => {
          flipCard.classList.add('flipped');
        });

        // 6. Post-flip effects
        setTimeout(() => {
          scene.classList.remove('busy');
          if (isBlack) {
            scene.classList.add('do-shake');
          } else {
            launchConfetti();
          }

          // Update history & info
          history.push(isBlack ? 'b' : 'r');
          renderHistory();
          updateStats();

          // Update run info text
          const rem  = bR + rR;
          const rPct = rem > 0 ? (bR / rem * 100) : 0;
          document.getElementById('remCount').textContent = rem + ' ใบ';
          document.getElementById('remPct').textContent   =
            (rPct % 1 === 0 ? rPct.toFixed(0) : rPct.toFixed(1)) + '%';

          // Check finished
          if (rem === 0) {
            setTimeout(showFinished, 800);
          } else {
            busy = false;
            document.getElementById('drawBtn').disabled = false;
          }
        }, 700);

      }, wasFlipped ? 320 : 60);
    }

    function renderHistory() {
      const list = document.getElementById('histList');
      const item = document.createElement('div');
      const last = history[history.length - 1];
      item.className = 'h-dot ' + (last === 'b' ? 'hb' : 'hr');
      item.title     = last === 'b' ? 'โดน!' : 'ปลอดภัย';
      item.textContent = history.length;
      list.appendChild(item);
    }

    function showFinished() {
      document.getElementById('modeTag').textContent = 'จบรอบ';
      const bCount = history.filter(x => x === 'b').length;
      const rCount = history.filter(x => x === 'r').length;
      document.getElementById('finishSummary').textContent =
        `ใบดำ ${bCount} คน · ใบแดง ${rCount} คน`;
      document.getElementById('finishBox').style.display = 'block';
      document.getElementById('drawBtn').style.display   = 'none';
      busy = false;
    }

    // ── Reset ────────────────────────────────────────────────────────────
    function reset() {
      started = false; busy = false; history = [];
      bR = bT; rR = rT;

      // Card
      const flipCard = document.getElementById('flipCard');
      const scene    = document.getElementById('scene');
      flipCard.style.transition = 'transform 0.28s ease-in';
      flipCard.classList.remove('flipped');
      setTimeout(() => { flipCard.style.transition = ''; }, 300);
      scene.classList.remove('do-shake', 'busy');

      // UI
      document.getElementById('modeTag').className  = 'mode-tag setup';
      document.getElementById('modeTag').textContent = 'ตั้งค่า';
      document.getElementById('runInfo').style.display   = 'none';
      document.getElementById('histWrap').style.display  = 'none';
      document.getElementById('histList').innerHTML = '';
      document.getElementById('finishBox').style.display = 'none';
      document.getElementById('drawBtn').style.display   = '';

      updateStats();
    }

    // ── Confetti ─────────────────────────────────────────────────────────
    const C_COLORS = ['#ff6b6b','#ffd700','#4ecdc4','#45b7d1','#a29bfe','#fd79a8','#55efc4'];

    function launchConfetti() {
      const box = document.getElementById('confetti');
      for (let i = 0; i < 60; i++) {
        const delay = i * 18;
        setTimeout(() => {
          const p = document.createElement('div');
          p.className = 'c-p';
          const size = 6 + Math.random() * 8;
          p.style.cssText = [
            `left:${Math.random()*100}%`,
            `top:0`,
            `width:${size}px`,
            `height:${size}px`,
            `background:${C_COLORS[i % C_COLORS.length]}`,
            `border-radius:${Math.random() > 0.5 ? '50%' : '2px'}`,
            `animation-duration:${1.2 + Math.random() * 1.4}s`,
            `animation-delay:0s`,
          ].join(';');
          box.appendChild(p);
          setTimeout(() => p.remove(), 3000);
        }, delay);
      }
    }

    // ── Init ─────────────────────────────────────────────────────────────
    updateStats();
  </script>
</body>
</html>
