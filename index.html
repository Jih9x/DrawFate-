<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>DrawFate</title>
  <meta name="description" content="จำลองการจับใบดำใบแดง ตั้งจำนวน ดูโอกาส สุ่มผลได้เลย">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --text-1: #f5f5f7;
      --text-2: rgba(235,235,245,0.6);
      --text-3: rgba(235,235,245,0.3);
      --sep: rgba(84,84,88,0.45);
      --fill: rgba(120,120,128,0.18);
      --fill2: rgba(120,120,128,0.26);
      --red: #ff453a;
      --green: #30d158;
      --amber: #ff9f0a;
      --r: 20px;
    }

    body {
      font-family: -apple-system, 'Sarabun', BlinkMacSystemFont, system-ui, sans-serif;
      background: #000;
      color: var(--text-1);
      min-height: 100dvh;
      padding: 0 18px 96px;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ambient glow */
    .glow-r, .glow-b {
      position: fixed; border-radius: 50%;
      pointer-events: none; z-index: 0;
    }
    .glow-r {
      width: 560px; height: 560px;
      background: radial-gradient(circle, rgba(255,59,48,.07) 0%, transparent 65%);
      top: -220px; left: -160px;
    }
    .glow-b {
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(10,132,255,.05) 0%, transparent 65%);
      bottom: -180px; right: -140px;
    }

    .container {
      max-width: 420px; margin: 0 auto;
      position: relative; z-index: 1;
    }

    /* ── Header ─────────────────────────── */
    header { padding: 52px 0 28px; text-align: center; }

    .app-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(145deg, #2a1d3d, #15102a);
      border: 1px solid rgba(255,255,255,0.09);
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
      font-size: 1.6rem; margin-bottom: 14px;
    }

    .app-name {
      display: block; font-size: 1.55rem;
      font-weight: 700; letter-spacing: -.4px;
      color: var(--text-1);
    }

    .app-tagline { font-size: .86rem; color: var(--text-2); margin-top: 5px; }

    /* ── Glass Card ─────────────────────── */
    .sheet {
      background: rgba(28,28,30,.65);
      backdrop-filter: blur(48px) saturate(180%);
      -webkit-backdrop-filter: blur(48px) saturate(180%);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: var(--r);
      padding: 0;
      margin-bottom: 12px;
      overflow: hidden;
    }

    .sheet-row {
      display: grid; grid-template-columns: 1fr 1fr;
    }

    .sheet-row > * + * { border-left: 1px solid var(--sep); }

    .cell { padding: 20px 16px; text-align: center; }

    /* ── Slip Controls ──────────────────── */
    .slip-head {
      display: inline-flex; align-items: center; gap: 6px;
      margin-bottom: 3px;
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-k { background: #8e8e93; }
    .dot-r { background: var(--red); }

    .slip-label { font-size: .78rem; font-weight: 500; color: var(--text-2); }
    .slip-sub   { display: block; font-size: .7rem; color: var(--text-3); margin-bottom: 14px; }

    .stepper {
      display: flex; align-items: center;
      justify-content: center; gap: 12px;
    }

    .s-btn {
      width: 30px; height: 30px; border-radius: 50%;
      border: none; background: var(--fill);
      color: var(--text-1); font-size: 1.1rem; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .12s, transform .1s;
      -webkit-user-select: none; user-select: none;
    }
    .s-btn:hover:not(:disabled) { background: var(--fill2); }
    .s-btn:active:not(:disabled) { transform: scale(.82); }
    .s-btn:disabled { opacity: .18; cursor: default; }

    .s-val {
      font-size: 2.4rem; font-weight: 700; letter-spacing: -1.5px;
      min-width: 46px; text-align: center; line-height: 1;
    }
    .s-val.v-k { color: #aeaeb2; }
    .s-val.v-r { color: var(--red); }

    /* ── Stats ──────────────────────────── */
    .stat-cell { padding: 20px 12px 16px; text-align: center; }

    .stat-lbl {
      font-size: .7rem; font-weight: 500;
      letter-spacing: .3px; color: var(--text-3);
      margin-bottom: 6px; min-height: 14px;
    }

    .stat-num {
      font-size: 4.4rem; font-weight: 700;
      letter-spacing: -3px; line-height: 1;
      transition: color .3s;
    }
    .stat-num.n-k  { color: var(--text-1); }
    .stat-num.n-r  { color: var(--red); }
    .stat-num.n-r.hot {
      text-shadow: 0 0 28px rgba(255,69,58,.4);
    }

    .stat-unit {
      font-size: .85rem; font-weight: 500;
      color: var(--text-3); margin-top: 4px;
    }

    /* mode pill */
    .pill-wrap { padding: 0 16px 16px; text-align: center; }

    .mode-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 20px;
      font-size: .68rem; font-weight: 600;
      background: var(--fill); color: var(--text-2);
    }
    .pip {
      width: 6px; height: 6px; border-radius: 50%;
      background: #636366; flex-shrink: 0;
    }
    .mode-pill.is-live  { background: rgba(48,209,88,.1); color: var(--green); }
    .mode-pill.is-live .pip { background: var(--green); }
    .mode-pill.is-done  { background: rgba(255,159,10,.1); color: var(--amber); }
    .mode-pill.is-done .pip { background: var(--amber); }

    /* ── Draw section ───────────────────── */
    .draw-wrap { padding: 24px 20px 20px; text-align: center; }

    /* Card flip */
    .scene {
      width: 148px; height: 208px; margin: 0 auto 22px;
      perspective: 1000px;
      animation: float 4s ease-in-out infinite;
    }
    .scene.busy { animation: none; }
    .scene.shake { animation: doShake .45s ease-out; }

    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }
    @keyframes doShake {
      0%,100% { transform: translateX(0); }
      14%  { transform: translateX(-10px) rotate(-.8deg); }
      28%  { transform: translateX(10px)  rotate(.8deg); }
      42%  { transform: translateX(-7px); }
      57%  { transform: translateX(7px); }
      71%  { transform: translateX(-3px); }
      85%  { transform: translateX(3px); }
    }

    .flip {
      width: 100%; height: 100%;
      position: relative; transform-style: preserve-3d;
      transition: transform .68s cubic-bezier(.34,.3,.1,1);
    }
    .flip.flipped { transform: rotateY(180deg); }

    .face {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: 18px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* back */
    .face-back {
      background: #0c0c10;
      border: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 24px 56px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.04);
      overflow: hidden;
    }
    .face-back::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        repeating-linear-gradient(60deg,
          rgba(255,255,255,.018) 0, rgba(255,255,255,.018) 1px,
          transparent 0, transparent 14px),
        repeating-linear-gradient(-60deg,
          rgba(255,255,255,.018) 0, rgba(255,255,255,.018) 1px,
          transparent 0, transparent 14px);
    }
    .back-sym  { position: relative; font-size: 1.8rem; opacity: .18; margin-bottom: 7px; }
    .back-word {
      position: relative; font-size: .58rem; letter-spacing: 4px;
      font-weight: 700; color: rgba(255,255,255,.15); text-transform: uppercase;
    }

    /* front */
    .face-front {
      transform: rotateY(180deg);
      overflow: hidden;
    }
    .face-front.f-black {
      background: linear-gradient(155deg, #1c1c1e 0%, #0a0a0c 100%);
      border: 1px solid rgba(255,255,255,.07);
      box-shadow: 0 24px 56px rgba(0,0,0,.7);
    }
    .face-front.f-red {
      background: linear-gradient(155deg, #3a0c14 0%, #180508 100%);
      border: 1px solid rgba(255,80,90,.12);
      box-shadow: 0 24px 56px rgba(0,0,0,.7), 0 0 50px rgba(255,59,48,.08);
    }
    .face-front::after {
      content: ''; position: absolute;
      inset: 12px; border-radius: 10px; pointer-events: none;
    }
    .face-front.f-black::after { border: 1px solid rgba(255,255,255,.05); }
    .face-front.f-red::after   { border: 1px solid rgba(255,100,100,.09); }

    .res-sym  { font-size: 2.6rem; margin-bottom: 8px; }
    .res-txt  { font-size: 1.3rem; font-weight: 700; letter-spacing: -.3px; }
    .res-txt.t-k { color: rgba(235,235,245,.65); }
    .res-txt.t-r { color: #f5f5f7; }

    /* ── Draw button ────────────────────── */
    .btn-draw {
      display: block; width: 100%; padding: 16px;
      border-radius: 14px; border: none;
      background: #f5f5f7; color: #1c1c1e;
      font-family: inherit; font-size: 1rem; font-weight: 700;
      letter-spacing: -.2px; cursor: pointer;
      transition: transform .14s, background .12s, box-shadow .14s;
      box-shadow: 0 2px 12px rgba(0,0,0,.35);
      -webkit-user-select: none; user-select: none;
    }
    .btn-draw:hover:not(:disabled) {
      background: #fff; transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(0,0,0,.45);
    }
    .btn-draw:active:not(:disabled) { transform: scale(.975); background: #e5e5ea; }
    .btn-draw:disabled { opacity: .18; cursor: default; transform: none; box-shadow: none; }

    /* ── Run info ───────────────────────── */
    .run-info {
      display: flex; justify-content: space-between;
      padding-top: 14px; border-top: 1px solid var(--sep);
      margin-top: 16px; font-size: .78rem;
    }
    .ri-label { color: var(--text-3); font-weight: 500; }
    .ri-val   { font-weight: 700; color: var(--text-2); margin-left: 3px; }

    /* ── History ────────────────────────── */
    .hist-area {
      padding-top: 14px; border-top: 1px solid var(--sep); margin-top: 14px;
    }
    .hist-title {
      font-size: .68rem; font-weight: 600; letter-spacing: .8px;
      text-transform: uppercase; color: var(--text-3); margin-bottom: 9px;
    }
    .hist-chips { display: flex; flex-wrap: wrap; gap: 5px; }

    .chip {
      height: 25px; min-width: 25px; padding: 0 7px;
      border-radius: 7px; display: inline-flex;
      align-items: center; justify-content: center;
      font-size: .67rem; font-weight: 700;
      animation: chipIn .22s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes chipIn {
      from { transform: scale(.2) rotate(-12deg); opacity: 0; }
      to   { transform: scale(1)  rotate(0);      opacity: 1; }
    }
    .chip-k {
      background: rgba(255,255,255,.07); color: var(--text-3);
      border: 1px solid rgba(255,255,255,.08);
    }
    .chip-r {
      background: rgba(255,59,48,.13); color: #ff6961;
      border: 1px solid rgba(255,59,48,.18);
    }

    /* ── Finished ───────────────────────── */
    .fin-box {
      padding: 22px 20px; border-radius: var(--r); margin-bottom: 12px;
      background: rgba(48,209,88,.07);
      border: 1px solid rgba(48,209,88,.14); text-align: center;
    }
    .fin-ico  { font-size: 1.8rem; }
    .fin-ttl  { font-size: 1rem; font-weight: 700; color: var(--green); margin-top: 8px; }
    .fin-sub  { font-size: .78rem; color: var(--text-3); margin-top: 5px; }

    /* ── Reset ──────────────────────────── */
    .btn-reset {
      display: block; width: 100%; padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.09);
      background: rgba(28,28,30,.5);
      backdrop-filter: blur(20px);
      color: var(--text-2); font-family: inherit;
      font-size: .9rem; font-weight: 600; cursor: pointer;
      transition: background .15s, color .15s;
    }
    .btn-reset:hover { background: rgba(255,255,255,.06); color: var(--text-1); }
    .btn-reset:active { transform: scale(.98); }

    /* ── Confetti ───────────────────────── */
    #confetti {
      position: fixed; inset: 0;
      pointer-events: none; overflow: hidden; z-index: 9999;
    }
    .c { position: absolute; animation: fall linear both; }
    @keyframes fall {
      0%   { transform: translateY(-10px) rotate(0); opacity: .9; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── Zero warning ───────────────────── */
    .zero-warn {
      text-align: center; font-size: .78rem;
      color: var(--amber); padding: 10px 0 0; font-weight: 500;
    }

    @media (max-width: 360px) {
      .stat-num { font-size: 3.6rem; }
      .s-val    { font-size: 2.1rem; }
    }
  </style>
</head>
<body>
  <div class="glow-r"></div>
  <div class="glow-b"></div>
  <div id="confetti"></div>

  <div class="container">

    <header>
      <div class="app-icon">🎴</div>
      <span class="app-name">DrawFate</span>
      <div class="app-tagline">จำลองการจับใบดำใบแดง</div>
    </header>

    <!-- Setup -->
    <div class="sheet">
      <div style="padding:16px 16px 6px">
        <span style="font-size:.7rem;font-weight:600;letter-spacing:.9px;text-transform:uppercase;color:var(--text-3)">ตั้งค่าใบ</span>
      </div>
      <div class="sheet-row">
        <div class="cell">
          <div class="slip-head">
            <span class="dot dot-k"></span>
            <span class="slip-label">ใบดำ</span>
          </div>
          <span class="slip-sub">โดน!</span>
          <div class="stepper">
            <button class="s-btn" id="bm" onclick="adj('b',-1)">−</button>
            <div class="s-val v-k" id="bc">1</div>
            <button class="s-btn" id="bp" onclick="adj('b',1)">+</button>
          </div>
        </div>
        <div class="cell">
          <div class="slip-head">
            <span class="dot dot-r"></span>
            <span class="slip-label">ใบแดง</span>
          </div>
          <span class="slip-sub">ปลอดภัย!</span>
          <div class="stepper">
            <button class="s-btn" id="rm" onclick="adj('r',-1)">−</button>
            <div class="s-val v-r" id="rc">5</div>
            <button class="s-btn" id="rp" onclick="adj('r',1)">+</button>
          </div>
        </div>
      </div>
      <div id="zeroWarn" class="zero-warn" style="display:none;padding-bottom:12px">⚠ ต้องมีใบอย่างน้อย 1 ใบ</div>
    </div>

    <!-- Stats -->
    <div class="sheet">
      <div class="sheet-row">
        <div class="stat-cell">
          <div class="stat-lbl" id="pplLbl">ผู้เล่นทั้งหมด</div>
          <div class="stat-num n-k" id="statPpl">6</div>
          <div class="stat-unit">คน</div>
        </div>
        <div class="stat-cell">
          <div class="stat-lbl" id="pctLbl">โอกาสใบดำ</div>
          <div class="stat-num n-r" id="statPct">16.7</div>
          <div class="stat-unit">%</div>
        </div>
      </div>
      <div class="pill-wrap">
        <div class="mode-pill" id="modePill">
          <span class="pip"></span>
          <span id="modeText">ตั้งค่า</span>
        </div>
      </div>
    </div>

    <!-- Draw -->
    <div class="sheet">
      <div class="draw-wrap">
        <!-- Card scene -->
        <div class="scene" id="scene">
          <div class="flip" id="flip">
            <div class="face face-back">
              <div class="back-sym">◆</div>
              <div class="back-word">DrawFate</div>
            </div>
            <div class="face face-front" id="ffront"></div>
          </div>
        </div>

        <!-- Draw button -->
        <button class="btn-draw" id="drawBtn" onclick="draw()">จับใบ</button>

        <!-- Run info -->
        <div class="run-info" id="runInfo" style="display:none">
          <span><span class="ri-label">ใบที่เหลือ</span><span class="ri-val" id="remC">—</span></span>
          <span><span class="ri-label">โอกาสครั้งนี้</span><span class="ri-val" id="remP">—</span></span>
        </div>

        <!-- History -->
        <div class="hist-area" id="histArea" style="display:none">
          <div class="hist-title">ผลที่ผ่านมา</div>
          <div class="hist-chips" id="chips"></div>
        </div>
      </div>
    </div>

    <!-- Finished -->
    <div class="fin-box" id="finBox" style="display:none">
      <div class="fin-ico">✦</div>
      <div class="fin-ttl">จบรอบแล้ว</div>
      <div class="fin-sub" id="finSub"></div>
    </div>

    <button class="btn-reset" onclick="reset()">↺  รีเซ็ตเริ่มใหม่</button>
  </div>

  <script>
    let bT=1, rT=5, bR=1, rR=5;
    let busy=false, started=false, hist=[];

    const fmt = n => n%1===0 ? n.toFixed(0) : n.toFixed(1);

    function updateUI() {
      const tot  = started ? bR+rR : bT+rT;
      const blk  = started ? bR : bT;
      const pct  = tot > 0 ? blk/tot*100 : 0;

      document.getElementById('statPpl').textContent = tot;
      document.getElementById('statPct').textContent = fmt(pct);
      pct>=50
        ? document.getElementById('statPct').classList.add('hot')
        : document.getElementById('statPct').classList.remove('hot');

      document.getElementById('pplLbl').textContent = started ? 'ใบที่เหลือ'     : 'ผู้เล่นทั้งหมด';
      document.getElementById('pctLbl').textContent = started ? 'โอกาสครั้งนี้' : 'โอกาสใบดำ';

      const none = (bT+rT) === 0;
      document.getElementById('zeroWarn').style.display = none ? 'block' : 'none';
      document.getElementById('drawBtn').disabled = none || busy;

      document.getElementById('bm').disabled = started || bT<=0;
      document.getElementById('bp').disabled = started;
      document.getElementById('rm').disabled = started || rT<=0;
      document.getElementById('rp').disabled = started;
    }

    function adj(t, d) {
      if (started) return;
      if (t==='b') { bT=Math.max(0,Math.min(99,bT+d)); bR=bT; document.getElementById('bc').textContent=bT; }
      else          { rT=Math.max(0,Math.min(99,rT+d)); rR=rT; document.getElementById('rc').textContent=rT; }
      updateUI();
    }

    function draw() {
      if (busy || bR+rR===0) return;
      busy = true;
      document.getElementById('drawBtn').disabled = true;

      const scene = document.getElementById('scene');
      const flip  = document.getElementById('flip');
      const front = document.getElementById('ffront');

      // stop float, clear shake
      scene.classList.add('busy');
      scene.classList.remove('shake');

      const wasFlipped = flip.classList.contains('flipped');
      if (wasFlipped) {
        flip.style.transition = 'transform .28s ease-in';
        flip.classList.remove('flipped');
      }

      setTimeout(() => {
        flip.style.transition = '';

        // first draw — start game
        if (!started) {
          started = true; bR = bT; rR = rT;
          const p = document.getElementById('modePill');
          p.className = 'mode-pill is-live';
          document.getElementById('modeText').textContent = 'กำลังจับ';
          document.getElementById('runInfo').style.display  = 'flex';
          document.getElementById('histArea').style.display = 'block';
          updateUI();
        }

        // pick result
        const isBlack = Math.random() * (bR+rR) < bR;
        if (isBlack) bR--; else rR--;

        // set front face
        front.className = 'face face-front ' + (isBlack ? 'f-black' : 'f-red');
        front.innerHTML = isBlack
          ? '<div class="res-sym" style="opacity:.5;font-size:2.2rem">●</div><div class="res-txt t-k">โดน!</div>'
          : '<div class="res-sym" style="font-size:2.4rem">◆</div><div class="res-txt t-r">ปลอดภัย!</div>';

        requestAnimationFrame(() => flip.classList.add('flipped'));

        // post-flip effects
        setTimeout(() => {
          scene.classList.remove('busy');

          if (isBlack) {
            // slight delay then shake
            setTimeout(() => scene.classList.add('shake'), 30);
          } else {
            launchConfetti();
          }

          // update history
          hist.push(isBlack ? 'k' : 'r');
          const chip = document.createElement('div');
          chip.className = 'chip ' + (isBlack ? 'chip-k' : 'chip-r');
          chip.textContent = hist.length;
          document.getElementById('chips').appendChild(chip);

          updateUI();

          const rem = bR+rR;
          const rp  = rem > 0 ? (bR/rem*100) : 0;
          document.getElementById('remC').textContent = ' ' + rem + ' ใบ';
          document.getElementById('remP').textContent = ' ' + fmt(rp) + '%';

          if (rem === 0) {
            setTimeout(finish, 900);
          } else {
            busy = false;
            document.getElementById('drawBtn').disabled = false;
          }
        }, 730);

      }, wasFlipped ? 320 : 60);
    }

    function finish() {
      const bC = hist.filter(x=>x==='k').length;
      const rC = hist.filter(x=>x==='r').length;
      document.getElementById('finSub').textContent = 'ใบดำ ' + bC + ' คน · ใบแดง ' + rC + ' คน';
      document.getElementById('finBox').style.display = 'block';
      document.getElementById('drawBtn').style.display = 'none';
      const p = document.getElementById('modePill');
      p.className = 'mode-pill is-done';
      document.getElementById('modeText').textContent = 'จบรอบ';
      busy = false;
    }

    function reset() {
      started = false; busy = false; hist = [];
      bR = bT; rR = rT;

      const flip = document.getElementById('flip');
      flip.style.transition = 'transform .28s ease-in';
      flip.classList.remove('flipped');
      setTimeout(() => flip.style.transition = '', 300);

      const scene = document.getElementById('scene');
      scene.classList.remove('busy','shake');

      document.getElementById('modePill').className = 'mode-pill';
      document.getElementById('modeText').textContent = 'ตั้งค่า';
      document.getElementById('runInfo').style.display  = 'none';
      document.getElementById('histArea').style.display = 'none';
      document.getElementById('chips').innerHTML = '';
      document.getElementById('finBox').style.display   = 'none';
      document.getElementById('drawBtn').style.display  = '';

      updateUI();
    }

    const CONF = ['#ff6b6b','#ffd60a','#30d158','#64d2ff','#bf5af2','#ff9f0a','#ff9eb5'];

    function launchConfetti() {
      const box = document.getElementById('confetti');
      for (let i=0; i<55; i++) {
        setTimeout(() => {
          const p = document.createElement('div');
          p.className = 'c';
          const s = 5 + Math.random()*8;
          p.style.cssText = [
            `left:${Math.random()*100}%`,
            `width:${s}px`, `height:${s}px`,
            `background:${CONF[i%CONF.length]}`,
            `border-radius:${Math.random()>.5?'50%':'3px'}`,
            `animation-duration:${1.1+Math.random()*1.5}s`,
          ].join(';');
          box.appendChild(p);
          setTimeout(() => p.remove(), 3200);
        }, i * 17);
      }
    }

    updateUI();
  </script>
</body>
</html>
